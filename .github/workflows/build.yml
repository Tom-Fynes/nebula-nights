name: Build and Release Nebula Nights Theme

on:
  push:
    tags:
      - "v*"
      - "V*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install dependencies
        run: npm install

      - name: Package extension
        run: npx vsce package

      - name: Get version from package.json (manual run)
        id: version
        if: github.event_name == 'workflow_dispatch'
        run: echo "VERSION=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Create tag if not exists (manual run)
        id: create-tag
        if: github.event_name == 'workflow_dispatch'
        uses: actions/github-script@v7
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        with:
          script: |
            const tag = `V${process.env.VERSION}`;
            try {
              await github.rest.git.getRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: `tags/${tag}`
              });
              console.log(`Tag ${tag} already exists.`);
            } catch (e) {
              if (e.status === 404) {
                await github.rest.git.createRef({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  ref: `refs/tags/${tag}`,
                  sha: context.sha
                });
                console.log(`Tag ${tag} created successfully.`);
              } else {
                throw e;
              }
            }
            core.setOutput('TAG', tag);

      - name: Determine release tag
        id: release-tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "TAG=${{ steps.create-tag.outputs.TAG }}" >> $GITHUB_OUTPUT
          else
            echo "TAG=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

      - name: Create Release and Upload VSIX
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release-tag.outputs.TAG }}
          name: Release ${{ steps.release-tag.outputs.TAG }}
          files: "*.vsix"
          generate_release_notes: true
          overwrite_files: true
